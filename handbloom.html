<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Bloom — open your hand to bloom</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }

#bloom-canvas {
  position:fixed; inset:0; width:100vw; height:100vh; z-index:0;
}

#hand-hint {
  position:fixed; bottom:48px; left:50%; transform:translateX(-50%);
  z-index:2; color:rgba(255,255,255,0.75);
  font-family:sans-serif; font-size:14px; letter-spacing:0.2em;
  text-transform:uppercase; transition:opacity .6s;
}
#openness-bar {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  z-index:2; width:180px; height:2px; background:rgba(255,255,255,0.15);
}
#openness-fill { height:100%; width:0%; background:rgba(255,190,170,0.9); }
</style>
</head>
<body>

<canvas id="bloom-canvas"></canvas>
<video id="flower-video" muted playsinline preload="auto" style="display:none;"></video>
<div id="hand-hint">open your hand to bloom</div>
<div id="openness-bar"><div id="openness-fill"></div></div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ══════════════════════════════════════════════════════
//  HAND → VIDEO SCRUB
//  손을 펼친 정도(0~1)가 영상의 재생 위치가 된다.
//  주먹 = 영상 첫 프레임(꽃봉오리), 활짝 = 마지막 프레임(만개)
// ══════════════════════════════════════════════════════

const VIDEO_SRC = 'flower-bloom.mp4';   // ← 여기만 내 영상으로 교체

const video = document.getElementById('flower-video');
const bloomCanvas = document.getElementById('bloom-canvas');
const bCtx = bloomCanvas.getContext('2d');

video.src = VIDEO_SRC;

let videoLoaded = false;
let currentOpenness = 0;   // 부드럽게 따라가는 값
let targetOpenness  = 0;   // 손에서 방금 측정한 값

video.addEventListener('loadedmetadata', () => {
  videoLoaded = true;
  video.currentTime = 0;
  video.pause();
});
video.load();

function resizeCanvases() {
  bloomCanvas.width = innerWidth; bloomCanvas.height = innerHeight;
}
resizeCanvases();
addEventListener('resize', resizeCanvases);

// ── 손 펼침 측정 ──────────────────────────────────────
// 손바닥 중심에서 다섯 손가락 끝까지의 평균 거리를
// 손바닥 크기로 나눠 정규화 → 0(주먹) ~ 1(활짝)
const FINGER_TIPS = [4, 8, 12, 16, 20];

function measureOpenness(lm) {
  const palmSize = Math.hypot(lm[9].x - lm[0].x, lm[9].y - lm[0].y);
  if (palmSize < 0.001) return 0;

  let cx = 0, cy = 0;
  [0, 5, 9, 13, 17].forEach(i => { cx += lm[i].x; cy += lm[i].y; });
  cx /= 5; cy /= 5;

  const minD = 0.75, maxD = 2.05;  // 감도: 낮추면 조금만 펴도 만개
  let sum = 0;
  FINGER_TIPS.forEach(ti => {
    const d = Math.hypot(lm[ti].x - cx, lm[ti].y - cy) / palmSize;
    sum += Math.max(0, Math.min(1, (d - minD) / (maxD - minD)));
  });
  return sum / 5;
}

// ── MediaPipe 셋업 ────────────────────────────────────
const wcam = document.createElement('video');
wcam.muted = true; wcam.playsInline = true;
wcam.style.display = 'none';
document.body.appendChild(wcam);

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.55,
});

hands.onResults(res => {
  const detected = res.multiHandLandmarks || [];
  if (detected.length > 0) {
    targetOpenness = measureOpenness(detected[0]);
    document.getElementById('hand-hint').style.opacity = '0';
  } else {
    targetOpenness = Math.max(0, targetOpenness - 0.04); // 손 치우면 천천히 닫힘
  }
});

new Camera(wcam, {
  onFrame: async () => { await hands.send({ image: wcam }); },
  width: 1280, height: 720,
}).start();

// ── 메인 루프: openness → 영상 스크럽 ─────────────────
let lastScrubTime = -1;

function drawFrame() {
  if (videoLoaded && video.readyState >= 2) {
    const cw = bloomCanvas.width, ch = bloomCanvas.height;
    const vw = video.videoWidth, vh = video.videoHeight;
    // cover: 비율 유지한 채 화면을 꽉 채우고 넘치는 부분은 중앙 크롭
    const scale = Math.max(cw / vw, ch / vh);
    const dw = vw * scale, dh = vh * scale;
    bCtx.clearRect(0, 0, cw, ch);
    bCtx.drawImage(video, (cw - dw) / 2, (ch - dh) / 2, dw, dh);
  }
}
video.addEventListener('seeked', drawFrame);

(function controlLoop() {
  requestAnimationFrame(controlLoop);

  currentOpenness += (targetOpenness - currentOpenness) * 0.1;

  if (videoLoaded && video.duration && isFinite(video.duration)) {
    const targetTime = currentOpenness * video.duration;
    if (Math.abs(targetTime - lastScrubTime) > 0.016 && !video.seeking) {
      video.currentTime = targetTime;
      lastScrubTime = targetTime;
    }
  }

  document.getElementById('openness-fill').style.width = (currentOpenness * 100) + '%';
})();
</script>
</body>
</html>
